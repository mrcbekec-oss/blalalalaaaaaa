<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sanal Oda</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <div id="joinModal" class="modal">
        <div class="modal-card">
          <h3>Odaya Katıl</h3>
          <div style="margin:12px 0; display:flex; gap:8px;">
            <input id="joinName" placeholder="Adın" />
            <input id="joinRoom" placeholder="Oda kodu (ör: 1234)" />
          </div>
          <div style="display:flex; gap:8px; justify-content:flex-end;">
            <button id="joinBtn" class="primary">Katıl</button>
          </div>
        </div>
      </div>
      <header class="topbar">
        <div>
          <p class="eyebrow">Online Sanal Oda</p>
          <h1>Film, yemek ve keyif bir arada</h1>
        </div>
        <div class="status-pill">
          <span class="status-dot"></span>
          Online · Oda #42
        </div>
      </header>

      <main class="main-grid">
        <section class="room-card">
          <div class="explore-hud">
            <p>Fareyle sürükleyin veya mobilde parmağınızla gezinin.</p>
            <div class="explore-controls">
              <button data-dir="up">↑</button>
              <button data-dir="left">←</button>
              <button data-dir="right">→</button>
              <button data-dir="down">↓</button>
              <button data-dir="reset" class="secondary">Reset</button>
            </div>
          </div>
          <div class="room-scene">
            <div id="placementHint" class="placement-hint hidden">
              Nesne yerleştirmek için odaya tıkla.
            </div>
            <div class="sofa"></div>
            <div class="tv-frame">
              <div class="tv-screen">
                <p>TV ekranı</p>
                <span>Seçtiğin filmi burada aç</span>
              </div>
            </div>
            <div class="snack-bar">
              <div class="snack-item"></div>
              <div class="snack-item"></div>
              <div class="snack-item"></div>
            </div>
          </div>
        </section>

        <section class="control-card">
          <div class="section-block">
            <h2>Canlı durum</h2>
            <div class="stat-row">
              <label>Açlık</label>
              <div class="bar">
                <div id="hungerBar" class="fill hunger"></div>
              </div>
              <span id="hungerValue">80%</span>
            </div>
            <div class="stat-row">
              <label>Susuzluk</label>
              <div class="bar">
                <div id="thirstBar" class="fill thirst"></div>
              </div>
              <span id="thirstValue">75%</span>
            </div>
          </div>

          <div class="section-block">
            <h2>Sipariş ver</h2>
            <div class="button-row">
              <button data-order="pizza">Pizza</button>
              <button data-order="burger">Burger</button>
              <button data-order="water">Su</button>
              <button data-order="cola">Kola</button>
            </div>
            <div id="orderList" class="order-list"></div>
          </div>

          <div class="section-block">
            <h2>Oda düzenle</h2>
            <label class="field-label" for="itemSelect">Nesne seç</label>
            <select id="itemSelect" class="select-input">
              <option value="lamp">Lamba</option>
              <option value="plant">Bitki</option>
              <option value="table">Masa</option>
              <option value="chair">Koltuk</option>
              <option value="poster">Poster</option>
            </select>
            <div class="button-row">
              <button id="placeModeButton" class="primary">Nesne ekle</button>
              <button id="clearItemsButton">Temizle</button>
            </div>
            <div id="roomItems" class="pill-list"></div>
          </div>

          <div class="section-block">
            <h2>Arkadaşlar</h2>
            <div class="inline-field">
              <input
                id="friendInput"
                type="text"
                placeholder="Arkadaş adı..."
              />
              <button id="addFriendButton">Ekle</button>
            </div>
            <div id="friendList" class="pill-list"></div>
          </div>

          <div class="section-block">
            <h2>Film seç</h2>
            <div id="movieList" class="movie-list"></div>
            <button id="playButton" class="primary">Filmi aç</button>
          </div>
        </section>
      </main>
    </div>

    <div id="movieModal" class="modal hidden" aria-hidden="true">
      <div class="modal-card">
        <div class="modal-header">
          <h3 id="modalTitle">Film</h3>
          <button id="closeModal" class="icon-btn">×</button>
        </div>
        <video id="moviePlayer" controls autoplay playsinline>
          <source
            src="https://www.w3schools.com/html/mov_bbb.mp4"
            type="video/mp4"
          />
        </video>
      </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="app.js"></script>
  </body>
</html>
