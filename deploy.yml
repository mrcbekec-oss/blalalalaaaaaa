name: Deploy to Deno Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Deno Deploy
        uses: denoland/deployctl@v1
        with:
          project: blalalalaaaaaa
          entrypoint: ./server.ts
